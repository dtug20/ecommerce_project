name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ── Backend ──
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

  # ── Frontend ──
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:7001

  # ── CRM ──
  crm:
    name: CRM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm/package-lock.json

      - run: npm ci

  # ── Docker Compose ──
  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    needs: [backend, frontend, crm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Create dummy .env files for validation
        run: |
          cp .env.production.example .env
          cp backend/.env.example backend/.env
          cp crm/.env.example crm/.env

      - name: Verify compose config
        run: docker compose -f docker-compose.prod.yml config --quiet
