<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shofy - Login Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login/resources/css/shofy-base.css">
    <link rel="stylesheet" href="../login/resources/css/shofy-login.css">
    <link rel="stylesheet" href="../login/resources/css/shofy-components.css">
    <script src="../login/resources/js/shofy-toast.js" defer></script>
</head>
<body>
    <div class="shofy-page-wrapper">
        <div class="shofy-bg-shapes">
            <div class="shofy-shape shofy-shape-1"></div>
            <div class="shofy-shape shofy-shape-2"></div>
            <div class="shofy-shape shofy-shape-3"></div>
            <div class="shofy-shape shofy-shape-4"></div>
        </div>

        <div class="shofy-login-card">
            <div class="shofy-lang-switcher">
                <button type="button" class="shofy-lang-btn" onclick="toggleLangMenu()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <span>vi</span>
                    <svg class="shofy-lang-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <ul class="shofy-lang-menu" id="shofy-lang-menu">
                    <li><a href="#" class="shofy-lang-option shofy-lang-active">Tiếng Việt</a></li>
                    <li><a href="#" class="shofy-lang-option">English</a></li>
                </ul>
            </div>

            <div class="shofy-logo">
                <svg width="120" height="36" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <text x="0" y="28" font-family="Jost, sans-serif" font-size="30" font-weight="700" fill="#010F1C">Shofy</text>
                </svg>
            </div>

            <h2 class="shofy-form-title">Đăng nhập vào Shofy</h2>
            <p class="shofy-form-subtitle">
                Chào mừng bạn quay lại!
                <a href="register-preview.html">Đăng ký ngay</a>
            </p>

            <div class="shofy-social-login">
                <a href="#" class="shofy-social-btn shofy-social-google">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    <span>Google</span>
                </a>
            </div>

            <div class="shofy-divider">
                <span>hoặc đăng nhập bằng Email</span>
            </div>

            <form onsubmit="return false;">
                <div class="shofy-field">
                    <label class="shofy-label" for="username">Email</label>
                    <div class="shofy-input-wrapper">
                        <input id="username" class="shofy-input" type="text" placeholder="Nhập email của bạn" autofocus />
                    </div>
                </div>

                <div class="shofy-field">
                    <label class="shofy-label" for="password">Mật khẩu</label>
                    <div class="shofy-input-wrapper shofy-password-wrapper">
                        <input id="password" class="shofy-input" type="password" placeholder="Nhập mật khẩu" />
                        <button type="button" class="shofy-toggle-password" onclick="togglePassword()">
                            <svg class="shofy-eye-icon" id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="shofy-form-options">
                    <label class="shofy-checkbox">
                        <input type="checkbox">
                        <span class="shofy-checkmark"></span>
                        Ghi nhớ đăng nhập
                    </label>
                    <a class="shofy-forgot-link" href="reset-password-preview.html">Quên mật khẩu?</a>
                </div>

                <div class="shofy-button-wrapper">
                    <button class="shofy-submit-btn" type="submit">Đăng nhập</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.SHOFY_TOAST_TITLES = { error: 'Lỗi', warning: 'Cảnh báo', success: 'Thành công', info: 'Thông báo' };

        function toggleLangMenu() {
            document.querySelector('.shofy-lang-switcher').classList.toggle('open');
            document.getElementById('shofy-lang-menu').classList.toggle('shofy-lang-menu-open');
        }
        document.addEventListener('click', function(e) {
            var s = document.querySelector('.shofy-lang-switcher');
            if (s && !s.contains(e.target)) { s.classList.remove('open'); document.getElementById('shofy-lang-menu').classList.remove('shofy-lang-menu-open'); }
        });

        function togglePassword() {
            var input = document.getElementById('password');
            var icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            }
        }
    </script>
</body>
</html>
