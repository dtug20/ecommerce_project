<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shofy - Reset Password Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login/resources/css/shofy-base.css">
    <link rel="stylesheet" href="../login/resources/css/shofy-login.css">
    <link rel="stylesheet" href="../login/resources/css/shofy-reset.css">
    <link rel="stylesheet" href="../login/resources/css/shofy-components.css">
</head>
<body>
    <div class="shofy-page-wrapper">
        <div class="shofy-bg-shapes">
            <div class="shofy-shape shofy-shape-1"></div>
            <div class="shofy-shape shofy-shape-2"></div>
            <div class="shofy-shape shofy-shape-3"></div>
            <div class="shofy-shape shofy-shape-4"></div>
        </div>

        <div class="shofy-login-card shofy-reset-card">
            <div class="shofy-reset-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0989FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>

            <h2 class="shofy-form-title">Quên mật khẩu?</h2>
            <p class="shofy-form-subtitle">Nhập email của bạn, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu.</p>

            <form onsubmit="return false;">
                <div class="shofy-field">
                    <label class="shofy-label">Email</label>
                    <input class="shofy-input" type="email" placeholder="Nhập email của bạn" autofocus />
                </div>

                <div class="shofy-button-wrapper">
                    <button class="shofy-submit-btn" type="submit">Gửi yêu cầu</button>
                </div>
            </form>

            <div class="shofy-back-link">
                <a href="login-preview.html">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    <span>Quay về Đăng nhập</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
