<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shofy - Register Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../login/resources/css/shofy-base.css">
    <link rel="stylesheet" href="../login/resources/css/shofy-login.css">
    <link rel="stylesheet" href="../login/resources/css/shofy-components.css">
</head>
<body>
    <div class="shofy-page-wrapper">
        <div class="shofy-bg-shapes">
            <div class="shofy-shape shofy-shape-1"></div>
            <div class="shofy-shape shofy-shape-2"></div>
            <div class="shofy-shape shofy-shape-3"></div>
            <div class="shofy-shape shofy-shape-4"></div>
        </div>

        <div class="shofy-login-card shofy-register-card">
            <div class="shofy-logo">
                <svg width="120" height="36" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <text x="0" y="28" font-family="Jost, sans-serif" font-size="30" font-weight="700" fill="#010F1C">Shofy</text>
                </svg>
            </div>

            <h2 class="shofy-form-title">Đăng ký tài khoản Shofy</h2>
            <p class="shofy-form-subtitle">
                Đã có tài khoản?
                <a href="login-preview.html">Đăng nhập</a>
            </p>

            <div class="shofy-social-login">
                <a href="#" class="shofy-social-btn shofy-social-google">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    <span>Google</span>
                </a>
            </div>

            <div class="shofy-divider">
                <span>hoặc đăng ký bằng Email</span>
            </div>

            <form onsubmit="return false;">
                <div class="shofy-field-row">
                    <div class="shofy-field shofy-field-half">
                        <label class="shofy-label">Tên</label>
                        <input class="shofy-input" type="text" placeholder="Nhập tên của bạn" />
                    </div>
                    <div class="shofy-field shofy-field-half">
                        <label class="shofy-label">Họ</label>
                        <input class="shofy-input" type="text" placeholder="Nhập họ của bạn" />
                    </div>
                </div>

                <div class="shofy-field">
                    <label class="shofy-label">Email</label>
                    <input class="shofy-input" type="email" placeholder="Nhập email của bạn" />
                </div>

                <div class="shofy-field">
                    <label class="shofy-label">Mật khẩu</label>
                    <div class="shofy-input-wrapper shofy-password-wrapper">
                        <input class="shofy-input" type="password" placeholder="Tạo mật khẩu (tối thiểu 6 ký tự)" />
                        <button type="button" class="shofy-toggle-password">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="shofy-field">
                    <label class="shofy-label">Xác nhận mật khẩu</label>
                    <div class="shofy-input-wrapper shofy-password-wrapper">
                        <input class="shofy-input" type="password" placeholder="Nhập lại mật khẩu" />
                        <button type="button" class="shofy-toggle-password">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="shofy-terms">
                    <label class="shofy-checkbox">
                        <input type="checkbox">
                        <span class="shofy-checkmark"></span>
                        Tôi đồng ý với Điều khoản dịch vụ
                    </label>
                </div>

                <div class="shofy-button-wrapper">
                    <button class="shofy-submit-btn" type="submit">Đăng ký</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
